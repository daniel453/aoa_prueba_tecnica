# Render Blueprint - https://render.com/docs/blueprint-spec
# Para usarlo: New > Blueprint > selecciona este repo (rootDir = inventario-kardex/backend)
services:
  - type: web
    name: inventario-kardex-api
    runtime: node
    plan: free
    rootDir: inventario-kardex/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FRONTEND_URL
        sync: false
